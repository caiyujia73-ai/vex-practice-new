<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VEX LAB</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600&display=swap" rel="stylesheet" />
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">

  <style>
    :root {
      --bg-base: #f4f1ea; 
      --glass: rgba(255, 255, 255, 0.4);
      --card-white: rgba(255, 255, 255, 0.85);
      --accent-orange: #F9A87D;
      --text-main: #2D2D2D;
      --text-sub: #888888;
      --easy: #A3B18A;
      --medium: #E9C46A;
      --hard: #E07A5F;
      --active-color: var(--easy);
      --success-green: #28a745;
      --fail-red: #e74c3c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Syne', sans-serif;
      background-color: var(--bg-base);
      /* 📜 核心：草纸纹理 */
      background-image: url('https://www.transparenttextures.com/patterns/handmade-paper.png');
      background-attachment: fixed;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 标题：左上角 */
    .page-logo {
      position: absolute; top: 15px; left: 20px;
      font-family: 'Special Elite', cursive;
      font-size: 20px; color: var(--text-main);
      z-index: 200; opacity: 0.8;
    }

    /* 语言：右上角 */
    .top-right-lang {
      position: absolute; top: 15px; right: 20px;
      display: flex; gap: 12px; z-index: 200;
    }
    .lang-link { cursor: pointer; font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; transition: 0.3s; }
    .lang-link.active { color: var(--text-main); text-decoration: underline; }

    /* 容器 */
    .alchemy-container {
      width: 95vw; height: 85vh; max-width: 1200px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      display: flex;
      box-shadow: 0 30px 60px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.5);
      overflow: hidden;
    }

    /* 伸缩侧边栏 */
    aside {
      width: 70px; height: 100%;
      background: rgba(255, 255, 255, 0.05);
      border-right: 1px solid rgba(0,0,0,0.03);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden; display: flex; flex-direction: column;
      padding-top: 60px;
    }
    @media (min-width: 769px) { aside:hover { width: 280px; } }

    .category-header {
      font-family: 'Special Elite', cursive; font-size: 11px; font-weight: 700;
      padding: 20px 15px 5px; opacity: 0; transition: 0.3s; white-space: nowrap;
    }
    aside:hover .category-header { opacity: 0.7; }

    .nav-item { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; }
    .nav-icon-circle {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 12px; font-weight: 700; color: white;
    }
    .nav-text-box { margin-left: 15px; opacity: 0; transition: 0.2s; white-space: nowrap; flex: 1; }
    aside:hover .nav-text-box { opacity: 1; }

    /* 小圆点战绩 */
    .record-dots { display: flex; gap: 4px; margin-top: 4px; }
    .mini-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* 主内容 */
    main { flex: 1; padding: 25px; overflow: hidden; display: flex; flex-direction: column; }
    .unified-card {
      background: var(--card-white); flex: 1;
      border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.02);
      display: flex; flex-direction: column; position: relative; overflow: hidden;
    }

    .question-overlay { padding: 30px 30px 0 30px; z-index: 5; }
    .question-overlay h2 { font-family: 'Special Elite', cursive; font-size: 26px; color: var(--active-color); letter-spacing: 1px; }
    .question-overlay p { font-size: 14px; color: var(--text-sub); margin-top: 8px; line-height: 1.5; max-width: 600px; }

    .editor-area { flex: 1; padding: 20px 30px 100px 30px; }
    #vex-editor {
      width: 100%; height: 100%; border: none; outline: none;
      font-family: 'JetBrains Mono', monospace; font-size: 14px;
      background: transparent; color: #444; resize: none; line-height: 1.8;
    }
    #vex-editor::placeholder { color: #000; opacity: 0.1; }

    .embedded-controls {
      position: absolute; bottom: 25px; right: 30px;
      display: flex; gap: 12px; z-index: 10;
    }
    .btn { padding: 12px 25px; border-radius: 18px; font-weight: 700; font-size: 11px; border: none; cursor: pointer; transition: 0.3s; font-family: 'Syne'; }
    .btn-hint { background: rgba(0,0,0,0.03); color: var(--text-sub); }
    .btn-submit { background: var(--accent-orange); color: white; box-shadow: 0 4px 12px rgba(249, 168, 125, 0.3); }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .alchemy-container { height: 92vh; border-radius: 20px; }
      aside { width: 65px; padding-top: 50px; }
      .nav-text-box { display: none; }
      aside:hover { width: 65px; }
      .question-overlay { padding: 20px 20px 0 20px; }
      .question-overlay h2 { font-size: 20px; }
      .embedded-controls { width: calc(100% - 40px); left: 20px; }
      .btn { flex: 1; }
    }

    /* 弹窗 */
    #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.05); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal { width: 100%; max-width: 450px; padding: 35px; border-radius: 30px; background: white; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
    .modal.success { background: #F2F9F5; border: 1px solid #D4EDDA; }
    .modal.failure { background: #FFF5F5; border: 1px solid #FEB2B2; }
  </style>
</head>
<body>

  <div class="page-logo">VEX LAB.</div>
  <div class="top-right-lang">
    <span class="lang-link" onclick="setLang('zh')" id="ln-zh">ZH</span>
    <span class="lang-link" onclick="setLang('en')" id="ln-en">EN</span>
  </div>

  <div class="alchemy-container">
    <aside id="sidebar-nav"></aside>
    <main>
      <div class="unified-card">
        <div class="question-overlay">
          <div style="display:flex; align-items:center; gap:6px; margin-bottom:5px;">
            <div style="width:8px; height:8px; border-radius:50%; background:var(--active-color)"></div>
            <span id="q-diff-text" style="font-size:9px; font-weight:700; color:var(--text-sub)">EASY</span>
          </div>
          <h2 id="q-title">...</h2>
          <p id="q-desc"></p>
        </div>
        <div class="editor-area">
          <textarea id="vex-editor" spellcheck="false" placeholder="// Initializing VEX Kernel..."></textarea>
        </div>
        <div class="embedded-controls">
          <button class="btn btn-hint" onclick="showHint()" id="btn-hint-txt">HINT</button>
          <button class="btn btn-submit" id="submit-btn" onclick="handleSubmit()">SUBMIT</button>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-overlay">
    <div class="modal" id="result-modal" onclick="event.stopPropagation()">
      <h3 id="modal-title" style="font-family:'Special Elite', cursive; margin-bottom:15px; font-size:22px;">Result</h3>
      <div id="modal-body" style="font-size:14px; color:#666; line-height:1.6;"></div>
      <div id="solution-area" style="display:none; margin-top:15px;">
         <div id="correct-code-text" style="background:#fff; padding:15px; border-radius:12px; font-family:'JetBrains Mono'; font-size:12px; text-align:left; color:#C53030; border:1px solid #eee;"></div>
      </div>
      <button class="btn btn-submit" style="width:100%; margin-top:25px;" onclick="closeFeedback()">CONTINUE</button>
    </div>
  </div>

  <script>
    const questions = [
      { category: "BEGINNER", items: [
        { qid: "b1", id: "01", difficulty: "easy", color: "var(--easy)", 
          title: { zh: "点染红色", en: "Crimson Hue" },
          desc: { zh: "将所有点颜色 (@Cd) 设为红色 {1,0,0}。", en: "Set color (@Cd) to red {1,0,0} for all points." },
          hint: { zh: "@Cd = {1,0,0};", en: "@Cd = {1,0,0};" },
          solution: "@Cd = {1,0,0};", attempts: 3, records: [] },
        { qid: "b2", id: "02", difficulty: "easy", color: "var(--easy)", 
          title: { zh: "坐标映射", en: "Position Map" },
          desc: { zh: "将 X 坐标映射给红色通道。", en: "Map X-coordinate to Red channel." },
          hint: { zh: "@Cd.r = @P.x;", en: "@Cd.r = @P.x;" },
          solution: "@Cd.r = @P.x;", attempts: 3, records: [] }
      ]},
      { category: "INTERMEDIATE", items: [
        { qid: "i1", id: "01", difficulty: "medium", color: "var(--medium)", 
          title: { zh: "随机缩放", en: "Random Scale" },
          desc: { zh: "生成随机 @pscale。", en: "Generate random @pscale based on @ptnum." },
          hint: { zh: "rand()", en: "Use rand()" },
          solution: "@pscale = rand(@ptnum);", attempts: 3, records: [] }
      ]}
    ];

    let currentCat = 0, currentIdx = 0, lang = 'en', lastCorrect = false;
    const savedCodes = {};
    const uiTexts = {
      zh: { hint: "线索", submit: "提交判断", success: "炼金成功", fail: "分析失败", retry: "请再试一次", left: "剩余机会: ", solution: "参考方案:" },
      en: { hint: "HINT", submit: "SUBMIT", success: "PASSED", fail: "FAILURE", retry: "Try Again", left: "Tries left: ", solution: "SOLUTION:" }
    };

    function setLang(l) {
      lang = l;
      document.querySelectorAll('.lang-link').forEach(el => el.classList.remove('active'));
      document.getElementById('ln-' + l).classList.add('active');
      render();
    }

    function render() {
      const nav = document.getElementById('sidebar-nav');
      nav.innerHTML = '';
      questions.forEach((cat, cIdx) => {
        const h = document.createElement('div');
        h.className = 'category-header';
        h.innerText = cat.category;
        nav.appendChild(h);
        cat.items.forEach((item, iIdx) => {
          const isActive = (cIdx===currentCat && iIdx===currentIdx);
          const el = document.createElement('div');
          el.className = `nav-item`;
          el.onclick = () => { 
            currentCat=cIdx; currentIdx=iIdx; 
            document.getElementById('vex-editor').value = savedCodes[questions[currentCat].items[currentIdx].qid] || ""; 
            render(); 
          };
          const iconBg = isActive ? item.color : (item.color + '88');
          let dotsHtml = '<div class="record-dots">';
          item.records.forEach(type => { dotsHtml += `<div class="mini-dot" style="background:${type==='green'?'var(--success-green)':'var(--fail-red)'}"></div>`; });
          dotsHtml += '</div>';

          el.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center;">
              <div class="nav-icon-circle" style="background: ${iconBg}">${item.id}</div>
              ${dotsHtml}
            </div>
            <div class="nav-text-box">
              <b style="font-size:12px; color:${isActive?'var(--text-main)':'var(--text-sub)'}">${item.title[lang]}</b>
            </div>
          `;
          nav.appendChild(el);
        });
      });
      const q = questions[currentCat].items[currentIdx];
      document.documentElement.style.setProperty('--active-color', q.color);
      document.getElementById('q-title').innerText = q.title[lang];
      document.getElementById('q-desc').innerText = q.desc[lang];
      document.getElementById('q-diff-text').innerText = q.difficulty.toUpperCase();
      document.getElementById('btn-hint-txt').innerText = uiTexts[lang].hint;
      document.getElementById('submit-btn').innerText = uiTexts[lang].submit;
    }

    async function handleSubmit() {
      const q = questions[currentCat].items[currentIdx];
      const code = document.getElementById('vex-editor').value;
      if (!code.trim() || q.attempts <= 0) return;
      document.getElementById('submit-btn').innerText = "...";
      try {
        const res = await fetch('/api/judge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, questionContext: q.title.en })
        });
        const data = await res.json();
        const modal = document.getElementById('result-modal');
        if (data.result === 'correct') {
          lastCorrect = true; q.records.push('green'); savedCodes[q.qid] = code;
          modal.className = "modal success";
          document.getElementById('modal-title').innerText = uiTexts[lang].success;
          document.getElementById('modal-body').innerText = data.explanation;
          document.getElementById('solution-area').style.display = 'none';
        } else {
          lastCorrect = false; q.attempts--; q.records.push('red');
          modal.className = "modal failure";
          if (q.attempts > 0) {
            document.getElementById('modal-title').innerText = uiTexts[lang].retry;
            document.getElementById('modal-body').innerText = uiTexts[lang].left + q.attempts;
            document.getElementById('solution-area').style.display = 'none';
          } else {
            document.getElementById('modal-title').innerText = uiTexts[lang].fail;
            document.getElementById('modal-body').innerText = data.explanation;
            document.getElementById('correct-code-text').innerText = uiTexts[lang].solution + "\n" + q.solution;
            document.getElementById('solution-area').style.display = 'block';
          }
        }
        document.getElementById('modal-overlay').style.display = 'flex';
      } catch (e) { alert("Error"); }
      finally { document.getElementById('submit-btn').innerText = uiTexts[lang].submit; render(); }
    }

    function closeFeedback() {
      if (!lastCorrect) document.getElementById('vex-editor').value = "";
      document.getElementById('modal-overlay').style.display = 'none';
    }

    function showHint() {
      const q = questions[currentCat].items[currentIdx];
      document.getElementById('modal-title').innerText = uiTexts[lang].hint;
      document.getElementById('modal-body').innerText = q.hint[lang];
      document.getElementById('solution-area').style.display = 'none';
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }
    setLang('en');
  </script>
</body>
</html>
