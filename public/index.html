<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX LAB | Unified Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #FFF5EE; 
      --glass: rgba(255, 255, 255, 0.4);
      --card-white: #FFFFFF;
      --accent-orange: #F9A87D;
      --text-main: #2D2D2D;
      --text-sub: #888888;
      
      --easy: #A3B18A;
      --medium: #E9C46A;
      --hard: #E07A5F;
      --active-color: var(--easy);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg-base);
      height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 右上角中英文切换 */
    .top-right-lang {
      position: absolute; top: 25px; right: 40px;
      display: flex; gap: 15px; z-index: 200;
    }
    .lang-link { cursor: pointer; font-size: 12px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }
    .lang-link.active { color: var(--text-main); text-decoration: underline; }

    /* 顶部打字机 Logo */
    .top-logo {
      font-family: 'Special Elite', cursive;
      font-size: 32px; color: var(--text-main); margin-bottom: 20px; letter-spacing: 2px;
    }

    .alchemy-container {
      width: 95vw; height: 80vh; max-width: 1200px;
      background: var(--glass);
      backdrop-filter: blur(25px);
      border-radius: 40px;
      display: flex;
      box-shadow: 0 40px 100px rgba(0,0,0,0.03);
      border: 1px solid rgba(255,255,255,0.7);
    }

    /* 伸缩侧边栏 */
    aside {
      width: 80px; height: 100%;
      background: rgba(255, 255, 255, 0.1);
      border-right: 1px solid rgba(0,0,0,0.05);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden; display: flex; flex-direction: column;
    }
    aside:hover { width: 300px; }

    /* 分类标题：统一打字机字体 + 加粗 */
    .category-header {
      font-family: 'Special Elite', cursive;
      font-size: 13px; 
      font-weight: 700; /* 加粗 */
      color: var(--text-main);
      padding: 25px 25px 10px; opacity: 0; transition: 0.3s;
      letter-spacing: 1px;
    }
    aside:hover .category-header { opacity: 0.9; }

    .nav-item {
      display: flex; align-items: center;
      padding: 10px 20px; cursor: pointer; transition: 0.3s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.3); }

    .nav-icon-circle {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 12px; font-weight: 700;
      color: white; transition: 0.3s;
    }

    .nav-text-box { margin-left: 15px; opacity: 0; transition: 0.2s; white-space: nowrap; flex: 1; }
    aside:hover .nav-text-box { opacity: 1; }

    .attempt-tag { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-sub); background: rgba(255,255,255,0.5); padding: 2px 6px; border-radius: 4px; }

    /* 合一卡片布局 */
    main { flex: 1; padding: 40px; overflow: hidden; }

    .unified-card {
      background: var(--card-white);
      width: 100%; height: 100%;
      border-radius: 35px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.04);
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }

    .question-overlay {
      padding: 40px 50px 0 50px;
      z-index: 5;
    }
    .diff-indicator {
      display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    .diff-dot { width: 10px; height: 10px; border-radius: 50%; }
    
    .question-overlay h2 {
      font-family: 'Special Elite', cursive;
      font-size: 32px; color: var(--active-color);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .question-overlay p {
      font-size: 15px; color: var(--text-sub); max-width: 650px; line-height: 1.6;
    }

    .editor-area {
      flex: 1;
      padding: 20px 50px 100px 50px;
    }
    #vex-editor {
      width: 100%; height: 100%;
      border: none; outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; line-height: 1.8;
      resize: none; background: transparent; color: #444;
    }

    .embedded-controls {
      position: absolute; bottom: 30px; right: 40px;
      display: flex; gap: 15px; z-index: 10;
    }
    .btn { padding: 12px 30px; border-radius: 20px; cursor: pointer; font-family: 'Syne'; font-weight: 700; font-size: 12px; transition: 0.3s; border: none; }
    .btn-hint { background: #F5F5F5; color: var(--text-sub); }
    .btn-submit { background: var(--accent-orange); color: white; box-shadow: 0 4px 15px rgba(249, 168, 125, 0.3); }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(249, 168, 125, 0.4); }

    /* 弹窗样式 */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.3);
      backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal { width: 500px; padding: 45px; border-radius: 35px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.05); }
    .modal.success { background: #F2F9F5; border: 1px solid #D4EDDA; }
    .modal.failure { background: #FFF5F5; border: 1px solid #FEB2B2; }
    #modal-body { font-size: 14px; line-height: 1.8; color: #666; margin: 25px 0; }
    .correct-code { background: #FFFFFF; padding: 15px; border-radius: 12px; font-family: 'JetBrains Mono'; font-size: 12px; color: #C53030; text-align: left; }
  </style>
</head>
<body>

  <div class="top-right-lang">
    <span class="lang-link active" onclick="setLang('zh')" id="ln-zh">ZH</span>
    <span class="lang-link" onclick="setLang('en')" id="ln-en">EN</span>
  </div>

  <div class="top-logo">VEX LAB.</div>

  <div class="alchemy-container">
    <aside id="sidebar-nav"></aside>

    <main>
      <div class="unified-card">
        <div class="question-overlay">
          <div class="diff-indicator">
            <div class="diff-dot" style="background: var(--active-color)"></div>
            <span id="q-diff-text" style="font-size: 10px; font-weight: 700; color: var(--text-sub)">EASY</span>
          </div>
          <h2 id="q-title">...</h2>
          <p id="q-desc"></p>
        </div>

        <div class="editor-area">
          <textarea id="vex-editor" spellcheck="false" placeholder="// Initializing VEX Kernel..."></textarea>
        </div>

        <div class="embedded-controls">
          <button class="btn btn-hint" onclick="showHint()" id="btn-hint-txt">HINT</button>
          <button class="btn btn-submit" id="submit-btn" onclick="handleSubmit()">SUBMIT</button>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-overlay" onclick="closeModal()">
    <div class="modal" id="result-modal" onclick="event.stopPropagation()">
      <h3 id="modal-title" style="font-family:'Special Elite', cursive; font-size:24px;">Result</h3>
      <div id="modal-body"></div>
      <div id="solution-area" style="display:none">
         <div class="correct-code" id="correct-code-text"></div>
      </div>
      <button class="btn btn-submit" style="width: 100%; margin-top:20px;" onclick="closeModal()" id="btn-modal-close">CONTINUE</button>
    </div>
  </div>

  <script>
    const questions = [
      { category: "BEGINNER", items: [
        { id: "01", difficulty: "easy", color: "var(--easy)", 
          title: { zh: "点染红色", en: "Crimson Hue" },
          desc: { zh: "将几何体中所有点的颜色属性 (@Cd) 设置为红色 {1,0,0}。", en: "Set the color attribute (@Cd) of all points to red {1,0,0}." },
          hint: { zh: "@Cd = {1,0,0};", en: "@Cd = {1,0,0};" },
          solution: "@Cd = {1,0,0};", attempts: 3 },
        { id: "02", difficulty: "easy", color: "var(--easy)", 
          title: { zh: "坐标映射", en: "Position Map" },
          desc: { zh: "将 X 坐标映射给红色通道。", en: "Map X-coordinate to Red channel." },
          hint: { zh: "@Cd.r = @P.x;", en: "@Cd.r = @P.x;" },
          solution: "@Cd.r = @P.x;", attempts: 3 }
      ]},
      { category: "INTERMEDIATE", items: [
        { id: "01", difficulty: "medium", color: "var(--medium)", 
          title: { zh: "随机缩放", en: "Random Scale" },
          desc: { zh: "基于 @ptnum 生成随机 @pscale。", en: "Generate random @pscale based on @ptnum." },
          hint: { zh: "rand()", en: "Use rand()" },
          solution: "@pscale = rand(@ptnum);", attempts: 3 }
      ]},
      { category: "ADVANCED", items: [
        { id: "01", difficulty: "hard", color: "var(--hard)", 
          title: { zh: "噪波位移", en: "Flowing Noise" },
          desc: { zh: "使用 curlnoise 偏移位置 @P。", en: "Offset position @P using curlnoise." },
          hint: { zh: "@P += curlnoise(@P);", en: "@P += curlnoise(@P);" },
          solution: "@P += curlnoise(@P);", attempts: 3 }
      ]}
    ];

    let currentCat = 0, currentIdx = 0, lang = 'zh';

    const uiTexts = {
      zh: { hint: "提示", submit: "提交分析", success: "正确", fail: "分析失败", retry: "请再试一次 (Try Again)", left: "剩余机会: ", solution: "参考方案:" },
      en: { hint: "HINT", submit: "SUBMIT", success: "PASSED", fail: "FAILURE", retry: "Try Again", left: "Tries left: ", solution: "SOLUTION:" }
    };

    function setLang(l) {
      lang = l;
      document.querySelectorAll('.lang-link').forEach(el => el.classList.remove('active'));
      document.getElementById('ln-' + l).classList.add('active');
      render();
    }

    function render() {
      const nav = document.getElementById('sidebar-nav');
      nav.innerHTML = '';
      questions.forEach((cat, cIdx) => {
        const h = document.createElement('div');
        h.className = 'category-header';
        h.innerText = cat.category;
        nav.appendChild(h);
        
        cat.items.forEach((item, iIdx) => {
          const isActive = (cIdx===currentCat && iIdx===currentIdx);
          const el = document.createElement('div');
          el.className = `nav-item ${isActive ? 'active' : ''}`;
          el.onclick = () => { if(currentIdx!==iIdx || currentCat!==cIdx) { currentCat=cIdx; currentIdx=iIdx; document.getElementById('vex-editor').value=""; render(); } };
          
          const iconBg = isActive ? item.color : (item.color + '88');
          
          el.innerHTML = `
            <div class="nav-icon-circle" style="background: ${iconBg}">${item.id}</div>
            <div class="nav-text-box">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <b style="font-size:13px; color: ${isActive ? 'var(--text-main)' : 'var(--text-sub)'}">${item.title[lang]}</b>
                <span class="attempt-tag">${item.attempts}/3</span>
              </div>
              <span style="font-size:9px; color:#AAA;">${item.difficulty.toUpperCase()}</span>
            </div>
          `;
          nav.appendChild(el);
        });
      });

      const q = questions[currentCat].items[currentIdx];
      document.documentElement.style.setProperty('--active-color', q.color);
      document.getElementById('q-title').innerText = q.title[lang];
      document.getElementById('q-desc').innerText = q.desc[lang];
      document.getElementById('q-diff-text').innerText = q.difficulty.toUpperCase();
      document.getElementById('btn-hint-txt').innerText = uiTexts[lang].hint;
      document.getElementById('submit-btn').innerText = uiTexts[lang].submit;
    }

    async function handleSubmit() {
      const q = questions[currentCat].items[currentIdx];
      const code = document.getElementById('vex-editor').value;
      if (!code.trim() || q.attempts <= 0) return;

      const btn = document.getElementById('submit-btn');
      btn.innerText = "...";

      try {
        const res = await fetch('/api/judge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, questionContext: `Task: ${q.title.en}.` })
        });
        const data = await res.json();
        const modal = document.getElementById('result-modal');
        const solArea = document.getElementById('solution-area');

        if (data.result === 'correct') {
          modal.className = "modal success";
          document.getElementById('modal-title').innerText = uiTexts[lang].success;
          document.getElementById('modal-body').innerText = data.explanation;
          solArea.style.display = 'none';
          showModal();
        } else {
          q.attempts--;
          render();
          modal.className = "modal failure";
          
          if (q.attempts > 0) {
            document.getElementById('modal-title').innerText = uiTexts[lang].retry;
            document.getElementById('modal-body').innerText = uiTexts[lang].left + q.attempts;
            solArea.style.display = 'none';
          } else {
            document.getElementById('modal-title').innerText = uiTexts[lang].fail;
            document.getElementById('modal-body').innerText = data.explanation;
            document.getElementById('correct-code-text').innerText = uiTexts[lang].solution + "\n" + q.solution;
            solArea.style.display = 'block';
          }
          showModal();
        }
      } catch (e) { alert("Error"); }
      finally { btn.innerText = uiTexts[lang].submit; }
    }

    function showHint() {
      const q = questions[currentCat].items[currentIdx];
      const modal = document.getElementById('result-modal');
      modal.className = "modal";
      document.getElementById('modal-title').innerText = uiTexts[lang].hint;
      document.getElementById('modal-body').innerText = q.hint[lang];
      document.getElementById('solution-area').style.display = 'none';
      showModal();
    }

    function showModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    render();
  </script>
</body>
</html>
