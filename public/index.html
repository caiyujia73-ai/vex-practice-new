<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX Lab | Transparent Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      /* 核心色彩：深邃、透明 */
      --bg-color: #08090a;
      --glass-surface: rgba(25, 28, 35, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-color: #c8f060; /* 青柠色 */
      --text-main: #e0e0e0;
      --text-dim: #888888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Space Mono', monospace;
      background: var(--bg-color);
      /* 背景装饰：微弱的径向渐变，增强透明感 */
      background-image: radial-gradient(circle at 50% 50%, #1a1c22 0%, #08090a 100%);
      color: var(--text-main);
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* --- Sidebar (毛玻璃侧边栏) --- */
    aside {
      background: var(--glass-surface);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--glass-border);
      padding: 40px 0;
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .brand {
      padding: 0 30px 40px;
      font-family: 'Cormorant Garamond', serif; /* 复古英文标题 */
      font-size: 26px;
      font-style: italic;
      letter-spacing: 1px;
      color: var(--accent-color);
    }

    .q-list { overflow-y: auto; flex: 1; padding: 0 15px; }
    
    .q-item {
      padding: 14px 20px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
      color: var(--text-dim);
      border: 1px solid transparent;
    }
    .q-item:hover { background: rgba(255, 255, 255, 0.03); color: var(--text-main); }
    .q-item.active {
      background: rgba(200, 240, 96, 0.1);
      border-color: rgba(200, 240, 96, 0.2);
      color: var(--accent-color);
    }

    /* --- Main Area --- */
    main {
      padding: 60px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-y: auto;
      position: relative;
    }

    /* 装饰：背景的大圆 */
    main::before {
      content: ""; position: absolute; top: 10%; left: 20%; width: 300px; height: 300px;
      background: var(--accent-color); opacity: 0.03; filter: blur(100px); pointer-events: none;
    }

    .glass-card {
      background: var(--glass-surface);
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      width: 100%;
      max-width: 850px;
      border-radius: 20px;
      padding: 50px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }

    h1 { 
      font-family: 'Cormorant Garamond', serif; 
      font-size: 38px; font-weight: 700; font-style: italic;
      margin-bottom: 15px; color: var(--text-main);
    }
    
    .desc { 
      font-size: 14px; line-height: 1.8; color: var(--text-dim); 
      margin-bottom: 40px; border-left: 2px solid var(--accent-color); padding-left: 20px;
    }

    /* Editor Box */
    .editor-container {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 35px;
    }

    textarea {
      width: 100%; height: 320px;
      background: transparent; border: none;
      padding: 15px; color: #fff;
      font-family: 'JetBrains Mono', monospace; font-size: 14px;
      line-height: 1.6; resize: none; outline: none;
    }

    /* Buttons */
    .footer { display: flex; gap: 20px; align-items: center; }
    
    .btn {
      padding: 12px 30px; border-radius: 30px;
      font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: 0.3s; text-transform: uppercase;
    }

    .btn-outline {
      background: transparent; border: 1px solid var(--glass-border); color: var(--text-dim);
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }

    .btn-fill {
      background: var(--accent-color); border: none; color: #000;
      box-shadow: 0 8px 20px rgba(200, 240, 96, 0.2);
    }
    .btn-fill:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-fill:disabled { opacity: 0.4; transform: none; cursor: not-allowed; }

    /* Modal (毛玻璃反馈窗) */
    #modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: rgba(30, 33, 40, 0.9); border: 1px solid var(--glass-border);
      width: 550px; padding: 40px; border-radius: 20px; text-align: left;
    }
    #modal-body { 
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.7; color: #aaa;
      margin: 25px 0; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px;
    }
  </style>
</head>
<body>

  <aside>
    <div class="brand">Laboratory.</div>
    <div class="q-list" id="q-list"></div>
  </aside>

  <main>
    <div class="glass-card">
      <h1 id="q-title">Loading...</h1>
      <div class="desc" id="q-desc"></div>

      <div class="editor-container">
        <textarea id="vex-editor" spellcheck="false" placeholder="// Initializing VEX kernel..."></textarea>
      </div>

      <div class="footer">
        <button class="btn btn-outline" onclick="showHint()">Hint</button>
        <button class="btn btn-fill" id="submit-btn" onclick="submitCode()">Execute Analysis</button>
      </div>
    </div>
  </main>

  <div id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modal-title" style="font-family: 'Cormorant Garamond', serif; font-size: 28px; font-style: italic;">Analysis Result</h3>
      <div id="modal-body"></div>
      <button class="btn btn-outline" style="width: 100%" onclick="closeModal()">Close Console</button>
    </div>
  </div>

  <script>
    const questions = [
      { id: "01", title: "Point Coloring", desc: "Write VEX code to set the color attribute (@Cd) of all points to pure red {1,0,0}. This is the foundation of attribute manipulation.", hint: "@Cd = {1,0,0};" },
      { id: "02", title: "Random Scale", desc: "Create a random @pscale for each point based on the @ptnum. Ensure each point has a unique size.", hint: "@pscale = rand(@ptnum);" },
      { id: "03", title: "Noise Displacement", desc: "Use the curlnoise() function to offset the position (@P) of points in 3D space.", hint: "@P += curlnoise(@P);" }
    ];

    let currentIdx = 0;

    function renderSidebar() {
      const list = document.getElementById('q-list');
      list.innerHTML = '';
      questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = `q-item ${i === currentIdx ? 'active' : ''}`;
        div.onclick = () => { currentIdx = i; renderSidebar(); updateContent(); };
        div.innerText = `${q.id}. ${q.title}`;
        list.appendChild(div);
      });
    }

    function updateContent() {
      const q = questions[currentIdx];
      document.getElementById('q-title').innerText = q.title;
      document.getElementById('q-desc').innerText = q.desc;
    }

    async function submitCode() {
      const code = document.getElementById('vex-editor').value;
      if (!code.trim()) return;

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerText = "Analyzing...";

      try {
        const res = await fetch('/api/judge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code: code,
            questionContext: `Task: ${questions[currentIdx].title}. Requirement: ${questions[currentIdx].desc}`
          })
        });
        const data = await res.json();
        showModal(data.result === 'correct' ? 'Success' : 'Correction Required', data.explanation);
      } catch (err) {
        alert("API Connection Error");
      } finally {
        btn.disabled = false;
        btn.innerText = "Execute Analysis";
      }
    }

    function showModal(title, content) {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-body').innerText = content;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function showHint() {
      showModal("Logical Hint", questions[currentIdx].hint);
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    renderSidebar();
    updateContent();
  </script>
</body>
</html>
