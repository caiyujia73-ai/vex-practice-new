<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX Practice Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FDF8F5; --surface: #FFFFFF; --surface2: #FFFBF9;
      --border: #F9A87D; --accent: #F9A87D; --text: #4A4A4A; 
      --muted: #8C8C8C; --diff-easy: #A8E6CF; --diff-mid: #FFD3B6;
      --diff-hard: #FFAAA5; --diff-vhard: #D4A5FF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: grid;
      grid-template-columns: 220px 1fr; grid-template-rows: 60px 1fr;
    }

    /* Header */
    header {
      grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between;
      padding: 0 25px; background: var(--surface); border-bottom: 2px solid var(--border); z-index: 100;
    }
    .logo { font-weight: 700; font-size: 18px; color: var(--accent); letter-spacing: -0.5px; }
    .lang-switch { display: flex; gap: 8px; }
    .lang-btn {
      padding: 4px 10px; border: 1px solid var(--border); background: transparent;
      border-radius: 12px; cursor: pointer; font-family: 'Syne'; font-size: 11px; transition: 0.3s;
    }
    .lang-btn.active { background: var(--accent); color: white; }

    /* Sidebar (Quest List) */
    aside { background: var(--surface); border-right: 1px solid #EEE5E0; padding: 15px; overflow-y: auto; }
    .nav-title { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 1px; }
    .q-item {
      padding: 8px 12px; margin-bottom: 6px; border-radius: 6px; cursor: pointer;
      font-size: 13px; transition: 0.2s; border: 1px solid transparent;
      display: flex; align-items: center; gap: 8px; color: var(--text);
    }
    .q-item:hover { background: var(--surface2); }
    .q-item.active { background: var(--surface2); border-color: var(--border); font-weight: 600; color: var(--accent); }
    .diff-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* Main Content */
    main { padding: 25px; display: flex; justify-content: center; overflow-y: auto; }
    .answer-card {
      background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
      padding: 25px; width: 100%; max-width: 850px; height: fit-content;
      box-shadow: 0 6px 15px rgba(249, 168, 125, 0.08);
    }
    .q-header h2 { font-size: 22px; margin-bottom: 10px; font-weight: 700; }
    .asset-box { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 6px; }
    .asset-tag {
      padding: 3px 8px; background: #F5F5F5; border-radius: 4px;
      font-size: 11px; font-family: 'JetBrains Mono'; color: #666;
    }
    #q-desc { font-size: 14px; line-height: 1.6; color: #555; margin-top: 10px; }

    /* Editor */
    .editor-wrap { margin: 20px 0; }
    textarea {
      width: 100%; height: 350px; background: #FBFBFB; border: 1px solid #DDD;
      border-radius: 8px; padding: 15px; font-family: 'JetBrains Mono', monospace;
      font-size: 13px; line-height: 1.5; resize: none; color: #333;
    }
    textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(249, 168, 125, 0.1); }

    /* Actions */
    .actions { display: flex; justify-content: space-between; align-items: center; }
    .btn {
      padding: 9px 20px; border-radius: 20px; border: 2px solid var(--accent);
      background: transparent; color: var(--accent); font-weight: 700;
      cursor: pointer; font-family: 'Syne'; transition: 0.3s; font-size: 14px;
    }
    .btn:hover { background: var(--accent); color: white; }
    .btn-primary { background: var(--accent); color: white; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Modal */
    #modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3); display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    #modal-overlay.open { display: flex; }
    .modal {
      background: white; padding: 25px; border-radius: 12px; width: 450px;
      border: 2px solid var(--border); position: relative;
    }
    #modal-body { 
      background: #F9F9F9; padding: 15px; border-radius: 8px; 
      font-size: 13px; line-height: 1.6; margin: 15px 0; max-height: 250px; overflow-y: auto;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">VEX CODE INTERN</div>
    <div class="lang-switch">
      <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <aside>
    <div class="nav-title" id="side-title">QUEST LIST</div>
    <div id="q-list"></div>
  </aside>

  <main>
    <div class="answer-card">
      <div class="q-header">
        <h2 id="q-title">载入中...</h2>
        <div class="asset-box" id="q-assets"></div>
        <p id="q-desc"></p>
      </div>

      <div class="editor-wrap">
        <textarea id="vex-code" placeholder="// Input your VEX code here..."></textarea>
      </div>

      <div class="actions">
        <button class="btn" onclick="showHint()" id="hint-btn">HINT</button>
        <button class="btn btn-primary" id="submit-btn" onclick="submitTask()">SUBMIT CARD</button>
      </div>
    </div>
  </main>

  <div id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modal-title" style="color: var(--accent)">RESULT</h3>
      <div id="modal-body"></div>
      <button class="btn" style="width: 100%" onclick="closeModal()" id="close-btn">CLOSE</button>
    </div>
  </div>

  <script>
    // --- 完整题目库集成 ---
    const questions = [
      {
        id: 1, difficulty: "easy",
        title: { zh: "01. 基础前进", en: "01. Basic Forward" },
        assets: ["Motor_Left", "Motor_Right"],
        desc: { zh: "让机器人以 50% 的速度前进 2 秒后停止。", en: "Drive forward at 50% velocity for 2 seconds and then stop." },
        hint: { zh: "使用 spin(forward) 配合 task::sleep(2000)。", en: "Use spin(forward) with task::sleep(2000)." }
      },
      {
        id: 2, difficulty: "easy",
        title: { zh: "02. 精确后退", en: "02. Precise Reverse" },
        assets: ["Drivetrain"],
        desc: { zh: "使用 Drivetrain 让机器人后退 200 毫米。", en: "Use Drivetrain to move the robot reverse for 200 mm." },
        hint: { zh: "尝试使用 driveFor(reverse, 200, mm)。", en: "Try using driveFor(reverse, 200, mm)." }
      },
      {
        id: 3, difficulty: "mid",
        title: { zh: "03. 原地转弯", en: "03. Point Turn" },
        assets: ["Motor_Left", "Motor_Right"],
        desc: { zh: "让左电机前进，右电机后退，实现原地右转 90 度（假设耗时 500ms）。", en: "Spin Left forward and Right reverse to turn 90 degrees (approx 500ms)." },
        hint: { zh: "给两个电机设置相反的运动方向。", en: "Set opposite directions for the two motors." }
      },
      {
        id: 4, difficulty: "mid",
        title: { zh: "04. 循环往复", en: "04. Loop Drive" },
        assets: ["Drivetrain"],
        desc: { zh: "使用 for 循环让机器人重复“前进10cm、后退10cm”动作 3 次。", en: "Use a for loop to repeat 'forward 10cm, reverse 10cm' 3 times." },
        hint: { zh: "for(int i=0; i<3; i++) { ... }", en: "Use for(int i=0; i<3; i++) { ... }" }
      },
      {
        id: 5, difficulty: "hard",
        title: { zh: "05. 触碰停止", en: "05. Bumper Stop" },
        assets: ["Drivetrain", "Bumper_Sensor"],
        desc: { zh: "让机器人一直前进，直到触碰传感器被按下时停止。", en: "Drive forward indefinitely until the Bumper sensor is pressed." },
        hint: { zh: "使用 while(!Bumper.pressing()) 循环。", en: "Use a while(!Bumper.pressing()) loop." }
      }
    ];

    let currentIdx = 0;
    let lang = 'zh';

    const uiText = {
      zh: { side: "题目列表", hint: "查看提示", submit: "提交答题卡", close: "关闭", judging: "AI 判题中...", alert: "请输入代码" },
      en: { side: "QUEST LIST", hint: "HINT", submit: "SUBMIT CARD", close: "CLOSE", judging: "JUDGING...", alert: "Enter code first" }
    };

    function setLang(l) {
      lang = l;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${l}`).classList.add('active');
      render();
    }

    function render() {
      // 侧边栏
      document.getElementById('side-title').innerText = uiText[lang].side;
      const list = document.getElementById('q-list');
      list.innerHTML = '';
      questions.forEach((q, i) => {
        const div = document.createElement('div');
        div.className = `q-item ${i === currentIdx ? 'active' : ''}`;
        div.onclick = () => { currentIdx = i; render(); };
        div.innerHTML = `<span class="diff-dot" style="background:var(--diff-${q.difficulty})"></span>${q.title[lang]}`;
        list.appendChild(div);
      });

      // 主内容
      const q = questions[currentIdx];
      document.getElementById('q-title').innerText = q.title[lang];
      document.getElementById('q-desc').innerText = q.desc[lang];
      document.getElementById('hint-btn').innerText = uiText[lang].hint;
      document.getElementById('submit-btn').innerText = uiText[lang].submit;
      document.getElementById('close-btn').innerText = uiText[lang].close;

      const assetEl = document.getElementById('q-assets');
      assetEl.innerHTML = q.assets.map(a => `<span class="asset-tag">${a}</span>`).join('');
    }

    async function submitTask() {
      const code = document.getElementById('vex-code').value;
      if (!code.trim()) return alert(uiText[lang].alert);

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerText = uiText[lang].judging;

      try {
        const res = await fetch('/api/judge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code: code,
            system: `你是一个 VEX 机器人竞赛裁判。当前题目：${questions[currentIdx].title.zh}。可用设备：${questions[currentIdx].assets.join(',')}。请判断代码逻辑。必须返回 JSON：{"result":"correct/wrong","short":"简短标题","explanation":"详细分析"}`
          })
        });
        const data = await res.json();
        
        document.getElementById('modal-title').innerText = (data.result === 'correct' ? '✅ ' : '❌ ') + (data.short || 'Result');
        document.getElementById('modal-body').innerText = data.explanation || 'No details provided.';
        document.getElementById('modal-overlay').classList.add('open');
      } catch (e) {
        alert("Server Error");
      } finally {
        btn.disabled = false;
        btn.innerText = uiText[lang].submit;
      }
    }

    function showHint() {
      document.getElementById('modal-title').innerText = "💡 HINT";
      document.getElementById('modal-body').innerText = questions[currentIdx].hint[lang];
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

    // 初始化渲染
    render();
  </script>
</body>
</html>
