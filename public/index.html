<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f14; --surface: #14171e; --surface2: #1a1d26;
      --border: #222630; --accent: #c8f060; --text: #e8e4d9;
      --muted: #666; --dimmer: #444;
    }
    body {
      font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: grid;
      grid-template-columns: 260px 1fr; grid-template-rows: 52px 1fr;
    }

    header {
      grid-column: 1 / -1; display: flex; align-items: center; gap: 12px;
      padding: 0 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .logo { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: var(--bg); }
    header h1 { font-size: 15px; font-weight: 700; letter-spacing: 0.03em; }
    header .tagline { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-left: auto; }

    aside { border-right: 1px solid var(--border); background: var(--surface); overflow-y: auto; padding: 1rem 0; }
    .sidebar-section { padding: 0 1rem 0.4rem; font-size: 10px; letter-spacing: 0.1em; color: var(--dimmer); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; margin-top: 1rem; }
    .q-item { display: flex; align-items: center; gap: 8px; padding: 8px 1rem; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; font-size: 13px; }
    .q-item:hover { background: var(--surface2); }
    .q-item.active { background: var(--surface2); border-left-color: var(--accent); color: var(--accent); }
    .q-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dimmer); min-width: 28px; }
    .q-title { flex: 1; }
    .q-badge { font-size: 10px; font-family: 'JetBrains Mono', monospace; padding: 2px 6px; border-radius: 3px; }
    .q-badge.easy { background: #0e2018; color: #4ade80; }
    .q-badge.medium { background: #1e1a08; color: #facc15; }
    .q-badge.hard { background: #1e1010; color: #f87171; }
    .q-badge.solved { background: #0e2018; color: #4ade80; }

    main { display: grid; grid-template-rows: 1fr auto; overflow: hidden; }
    .content { display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }

    .question-panel { padding: 1.5rem; border-right: 1px solid var(--border); overflow-y: auto; }
    .q-header { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
    .diff-badge { font-size: 11px; font-family: 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 4px; }
    .diff-badge.easy { background: #0e2018; color: #4ade80; }
    .diff-badge.medium { background: #1e1a08; color: #facc15; }
    .diff-badge.hard { background: #1e1010; color: #f87171; }
    .category-tag { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); background: var(--surface2); padding: 3px 8px; border-radius: 4px; }
    .q-main-title { font-size: 19px; font-weight: 700; margin-bottom: 0.7rem; color: #f0ece0; }
    .q-desc { font-size: 14px; color: #999; line-height: 1.8; }
    .q-desc code { font-family: 'JetBrains Mono', monospace; background: var(--surface2); color: var(--accent); padding: 1px 6px; border-radius: 4px; font-size: 12px; }

    /* Expected result — hidden by default, revealed after submit */
    .expected-box {
      margin-top: 1.2rem; background: var(--surface2);
      border-left: 3px solid #c8f06050; border-radius: 0 8px 8px 0; padding: 12px 16px;
      transition: opacity 0.4s, filter 0.4s;
    }
    .expected-box.hidden { opacity: 0; filter: blur(6px); pointer-events: none; user-select: none; }
    .expected-box.revealed { opacity: 1; filter: none; }
    .expected-label {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 10px; letter-spacing: 0.1em; color: var(--accent);
      font-family: 'JetBrains Mono', monospace; text-transform: uppercase; margin-bottom: 6px;
    }
    .reveal-hint { font-size: 10px; color: var(--dimmer); font-style: italic; text-transform: none; letter-spacing: 0; }
    .expected-box pre { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #aaa; line-height: 1.6; white-space: pre-wrap; }

    .editor-panel { display: flex; flex-direction: column; overflow: hidden; }
    .editor-toolbar { display: flex; align-items: center; gap: 8px; padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); background: var(--surface); }
    .editor-toolbar span { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--dimmer); }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-r { background: #f87171; } .dot-y { background: #facc15; } .dot-g { background: #4ade80; }

    #vex-editor { flex: 1; background: var(--bg); border: none; outline: none; resize: none; padding: 1.2rem; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); line-height: 1.7; min-height: 0; }
    #vex-editor::placeholder { color: #2a2d35; }

    .bottom-bar { display: flex; align-items: center; gap: 10px; padding: 0.7rem 1.2rem; border-top: 1px solid var(--border); background: var(--surface); }
    .submit-btn { display: flex; align-items: center; gap: 8px; background: var(--accent); color: var(--bg); border: none; border-radius: 7px; padding: 8px 18px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .hint-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 7px; padding: 8px 14px; font-family: 'Syne', sans-serif; font-size: 13px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .hint-btn:hover { border-color: var(--dimmer); color: var(--text); }
    .spinner { width: 13px; height: 13px; border: 2px solid #0d0f1440; border-top-color: var(--bg); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .feedback-area { flex: 1; display: flex; align-items: center; overflow: hidden; }
    .feedback-pill { display: none; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 7px; font-size: 13px; line-height: 1.4; max-width: 100%; overflow: hidden; }
    .feedback-pill.correct { display: flex; background: #0e2018; color: #7de0b5; border: 1px solid #1D9E7530; }
    .feedback-pill.wrong   { display: flex; background: #1e1010; color: #e8a0a0; border: 1px solid #c0403030; }
    .feedback-pill.partial { display: flex; background: #1e1a08; color: #e8d080; border: 1px solid #c8a03030; }
    .fb-icon { font-size: 15px; flex-shrink: 0; }
    .fb-short { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .detail-link { font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: underline; white-space: nowrap; flex-shrink: 0; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: #000a; z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.8rem; max-width: 540px; width: 90%; position: relative; }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 1rem; }
    .modal-body { font-size: 13px; color: #bbb; line-height: 1.8; white-space: pre-wrap; font-family: 'JetBrains Mono', monospace; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: var(--surface2); border: none; color: var(--muted); width: 26px; height: 26px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .modal-close:hover { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="logo">V</div>
  <h1>VEX Practice</h1>
  <span class="tagline">Houdini VEX · AI-powered</span>
</header>

<aside>
  <div class="sidebar-section">Beginner</div>
  <div class="q-item active" onclick="loadQuestion(0)" id="qitem-0">
    <span class="q-num">#001</span><span class="q-title">点染红色</span>
    <span class="q-badge easy">Easy</span>
  </div>
  <div class="q-item" onclick="loadQuestion(1)" id="qitem-1">
    <span class="q-num">#002</span><span class="q-title">随机缩放点</span>
    <span class="q-badge easy">Easy</span>
  </div>
  <div class="q-item" onclick="loadQuestion(2)" id="qitem-2">
    <span class="q-num">#003</span><span class="q-title">按Y轴染色</span>
    <span class="q-badge medium">Medium</span>
  </div>
  <div class="sidebar-section">Intermediate</div>
  <div class="q-item" onclick="loadQuestion(3)" id="qitem-3">
    <span class="q-num">#004</span><span class="q-title">噪波位移</span>
    <span class="q-badge medium">Medium</span>
  </div>
  <div class="q-item" onclick="loadQuestion(4)" id="qitem-4">
    <span class="q-num">#005</span><span class="q-title">删除偶数点</span>
    <span class="q-badge hard">Hard</span>
  </div>
</aside>

<main>
  <div class="content">
    <div class="question-panel">
      <div class="q-header">
        <span class="diff-badge" id="q-diff"></span>
        <span class="category-tag" id="q-cat"></span>
      </div>
      <div class="q-main-title" id="q-title"></div>
      <div class="q-desc" id="q-desc"></div>
      <div class="expected-box hidden" id="expected-box">
        <div class="expected-label">
          <span>期望结果</span>
          <span class="reveal-hint" id="reveal-hint">提交后显示</span>
        </div>
        <pre id="q-expected"></pre>
      </div>
    </div>

    <div class="editor-panel">
      <div class="editor-toolbar">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
        <span style="margin-left:4px;">wrangle.vex</span>
      </div>
      <textarea id="vex-editor" placeholder="// 在这里输入你的 VEX 代码&#10;// Write your VEX code here"></textarea>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="submit-btn" id="submit-btn" onclick="submitVex()">
      <span id="btn-icon">▶</span>
      <div class="spinner" id="spinner"></div>
      <span id="btn-text">提交判断</span>
    </button>
    <button class="hint-btn" onclick="getHint()">提示</button>
    <div class="feedback-area">
      <div class="feedback-pill" id="feedback-pill">
        <span class="fb-icon" id="fb-icon"></span>
        <span class="fb-short" id="fb-short"></span>
        <span class="detail-link" onclick="openModal()">详情 →</span>
      </div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title"></h2>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const questions = [
  {
    title: "将所有点染成红色",
    diff: "easy", cat: "ATTRIBUTE · WRANGLE",
    desc: `在 Geometry Wrangle 中，将所有点的颜色属性 <code>@Cd</code> 设置为纯红色。<br><br>每个 point 都应该被设置，不需要循环。`,
    expected: "@Cd = {1, 0, 0}\n// R=1, G=0, B=0",
    judge: `题目：Geometry Wrangle 中将所有点的 @Cd 设为纯红色 {1,0,0}。判断：@Cd 最终必须等于 {1,0,0}，语法正确，语句以分号结尾。`,
    hint: "@Cd 是 vector 类型。可以直接赋值字面量 {1, 0, 0}，也可以分别设置 .r .g .b 三个分量。"
  },
  {
    title: "随机缩放每个点",
    diff: "easy", cat: "ATTRIBUTE · WRANGLE",
    desc: `为每个点添加 <code>@pscale</code> 属性，值为 0 到 2 之间的随机数。<br><br>要求：每个点的值不同，基于点的序号生成。`,
    expected: "@pscale = rand(@ptnum) * 2\n// 每个点有不同的随机缩放",
    judge: `题目：Geometry Wrangle 中为每个点设置 @pscale 为 0~2 的随机数，用 rand(@ptnum) 生成，确保每个点不同。`,
    hint: "rand(@ptnum) 根据点序号生成 0~1 的随机数。乘以 2 即可扩展到 0~2 范围。"
  },
  {
    title: "根据 Y 轴高度染色",
    diff: "medium", cat: "ATTRIBUTE · MATH",
    desc: `根据每个点的 Y 坐标将颜色从黑渐变到白。<br><br>假设 Y 范围为 0~1，使用 <code>@P.y</code> 获取 Y 坐标，赋给 <code>@Cd</code> 作为灰度值。`,
    expected: "@Cd = @P.y\n// Y=0 → 黑色，Y=1 → 白色",
    judge: `题目：用 @P.y 值设置 @Cd，形成从黑到白的灰度渐变。Y=0时@Cd={0,0,0}，Y=1时@Cd={1,1,1}。`,
    hint: "@Cd 接受 float 值时，会自动广播到 R/G/B 三个通道，形成灰色。"
  },
  {
    title: "用噪波位移点的位置",
    diff: "medium", cat: "NOISE · DISPLACEMENT",
    desc: `使用 <code>noise()</code> 函数，根据每个点的原始位置产生噪波值，将其乘以 0.5 后加到 <code>@P.y</code> 上。`,
    expected: "@P.y += noise(@P) * 0.5\n// 产生不规则高度起伏",
    judge: `题目：用 noise(@P) 采样，结果乘以 0.5 后加到 @P.y，产生 Y 轴方向的噪波位移。`,
    hint: "noise(@P) 返回 0~1 的值。用 -= 0.5 可让值居中，避免整体抬高。"
  },
  {
    title: "删除所有偶数编号的点",
    diff: "hard", cat: "REMOVAL · CONDITIONAL",
    desc: `删除所有 <code>@ptnum</code> 为偶数（0, 2, 4...）的点，只保留奇数点。<br><br>提示：使用 <code>removepoint()</code> 和取余运算符 <code>%</code>。`,
    expected: "// 只保留奇数编号的点\n// 点数量减少约一半",
    judge: `题目：删除所有 @ptnum 为偶数的点（0,2,4...），用 removepoint(0,@ptnum) 和 % 运算符。保留奇数点。`,
    hint: "if (@ptnum % 2 == 0) 判断偶数。removepoint(0, @ptnum) 的第一个参数 0 代表当前几何体。"
  }
];

let currentQ = 0;
let lastFeedback = null;

function loadQuestion(idx) {
  currentQ = idx;
  const q = questions[idx];
  document.querySelectorAll('.q-item').forEach((el, i) => el.classList.toggle('active', i === idx));

  const diffEl = document.getElementById('q-diff');
  diffEl.textContent = q.diff.charAt(0).toUpperCase() + q.diff.slice(1);
  diffEl.className = 'diff-badge ' + q.diff;
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-title').textContent = q.title;
  document.getElementById('q-desc').innerHTML = q.desc;
  document.getElementById('q-expected').textContent = q.expected;

  // Hide expected result on load
  const box = document.getElementById('expected-box');
  box.classList.remove('revealed');
  box.classList.add('hidden');
  document.getElementById('reveal-hint').textContent = '提交后显示';

  document.getElementById('vex-editor').value = '';
  document.getElementById('feedback-pill').className = 'feedback-pill';
  lastFeedback = null;
}

function revealExpected() {
  const box = document.getElementById('expected-box');
  box.classList.remove('hidden');
  box.classList.add('revealed');
  document.getElementById('reveal-hint').textContent = '官方参考答案';
}

async function submitVex() {
  const code = document.getElementById('vex-editor').value.trim();
  if (!code) { alert('请先输入 VEX 代码'); return; }

  const btn = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  const btnIcon = document.getElementById('btn-icon');
  btn.disabled = true;
  btnIcon.style.display = 'none';
  spinner.style.display = 'block';
  document.getElementById('btn-text').textContent = '判断中...';
  document.getElementById('feedback-pill').className = 'feedback-pill';

  try {
    const res = await fetch('/api/judge', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ questionContext: questions[currentQ].judge, code })
    });
    const data = await res.json();
    lastFeedback = data;
    showFeedback(data);

    // Reveal expected result after first submission
    revealExpected();

  } catch (err) {
    const fallback = { result: 'wrong', short: '连接错误', explanation: '无法连接判断服务：' + err.message };
    lastFeedback = fallback;
    showFeedback(fallback);
  }

  btn.disabled = false;
  btnIcon.style.display = 'inline';
  spinner.style.display = 'none';
  document.getElementById('btn-text').textContent = '重新提交';
}

function showFeedback(data) {
  const pill = document.getElementById('feedback-pill');
  const icons = { correct: '✓', wrong: '✗', partial: '△' };
  document.getElementById('fb-icon').textContent = icons[data.result] || '?';
  document.getElementById('fb-short').textContent = data.short || '';
  pill.className = 'feedback-pill ' + data.result;
}

function getHint() {
  document.getElementById('modal-title').textContent = '💡 提示';
  document.getElementById('modal-body').textContent = questions[currentQ].hint;
  document.getElementById('modal-overlay').classList.add('open');
}

function openModal() {
  if (!lastFeedback) return;
  document.getElementById('modal-title').textContent = lastFeedback.short || '判断详情';
  document.getElementById('modal-body').textContent = lastFeedback.explanation || '';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

loadQuestion(0);
</script>
</body>
</html>
