<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX LAB | Studio Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@1,600;1,700&family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #FFF5EE; 
      --glass: rgba(255, 255, 255, 0.4);
      --card-white: #FFFFFF;
      --accent-orange: #F9A87D; /* 第三点：橙色 Submit */
      --text-main: #2D2D2D;
      --text-sub: #888888;
      
      --easy: #A3B18A;
      --medium: #E9C46A;
      --hard: #E07A5F;
      --active-color: var(--easy);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg-base);
      height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 第二点：中英文切换移至网页右上角 */
    .top-right-lang {
      position: absolute;
      top: 25px;
      right: 40px;
      display: flex;
      gap: 15px;
      z-index: 200;
    }
    .lang-link { 
      cursor: pointer; font-size: 12px; font-weight: 700; color: var(--text-sub); 
      text-transform: uppercase; transition: 0.3s;
    }
    .lang-link.active { color: var(--text-main); text-decoration: underline; }

    /* 第二点：VEX LAB 标题 */
    .top-logo {
      font-family: 'Special Elite', cursive;
      font-size: 32px;
      color: var(--text-main);
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .alchemy-container {
      width: 95vw; height: 80vh; max-width: 1200px;
      background: var(--glass);
      backdrop-filter: blur(25px);
      border-radius: 40px;
      display: flex;
      box-shadow: 0 40px 100px rgba(0,0,0,0.03);
      border: 1px solid rgba(255,255,255,0.7);
    }

    /* 侧边栏 */
    aside {
      width: 300px; height: 100%;
      background: rgba(255, 255, 255, 0.2);
      border-right: 1px solid rgba(0,0,0,0.05);
      padding: 30px 0;
      overflow-y: auto;
    }

    /* 第四点：难度大分类标题 */
    .category-header {
      font-family: 'Special Elite', cursive;
      font-size: 14px;
      color: var(--text-main);
      padding: 20px 25px 10px;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .nav-item {
      display: flex; align-items: center;
      padding: 10px 25px; cursor: pointer; transition: 0.3s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.3); }
    .nav-item.active { background: rgba(255,255,255,0.5); }

    .q-num-box {
      width: 30px; font-family: 'JetBrains Mono'; font-size: 12px; color: var(--text-sub);
    }
    .q-title-box { flex: 1; font-size: 14px; color: var(--text-main); margin-left: 5px; }
    .attempt-tag { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-sub); background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px; }

    /* 内容区 */
    main { flex: 1; display: grid; grid-template-columns: 380px 1fr; gap: 30px; padding: 40px; align-items: center; }

    .desc-card {
      background: var(--card-white); padding: 45px; border-radius: 35px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.04); height: 100%;
      display: flex; flex-direction: column; justify-content: center;
    }
    .desc-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 42px; color: var(--active-color); font-style: italic; margin-bottom: 20px; }
    .desc-card p { font-size: 15px; color: var(--text-sub); line-height: 1.8; }

    .editor-card {
      background: var(--card-white); border-radius: 35px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.04); height: 100%;
      position: relative; display: flex; flex-direction: column;
    }
    #vex-editor {
      flex: 1; border: none; outline: none; padding: 35px;
      font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.8; resize: none;
    }

    /* 第三点：内嵌按钮 */
    .embedded-controls {
      position: absolute; bottom: 25px; right: 25px;
      display: flex; gap: 12px;
    }
    .btn { padding: 10px 25px; border-radius: 15px; cursor: pointer; font-family: 'Syne'; font-weight: 700; font-size: 11px; transition: 0.3s; }
    .btn-hint { background: #F5F5F5; border: none; color: var(--text-sub); }
    
    /* 第三点：橙色按钮 */
    .btn-submit { background: var(--accent-orange); color: white; border: none; box-shadow: 0 4px 15px rgba(249, 168, 125, 0.3); }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(249, 168, 125, 0.4); }

    /* 第一点：反馈弹窗 */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.3);
      backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal { width: 500px; padding: 45px; border-radius: 35px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.05); }
    .modal.success { background: #F2F9F5; border: 1px solid #D4EDDA; }
    .modal.failure { background: #FFF5F5; border: 1px solid #FEB2B2; } /* 第一点：淡红色 */
    #modal-body { font-size: 14px; line-height: 1.8; color: #666; margin: 25px 0; }
    .correct-code { background: #FFFFFF; padding: 15px; border-radius: 12px; font-family: 'JetBrains Mono'; font-size: 12px; color: #C53030; text-align: left; }
  </style>
</head>
<body>

  <div class="top-right-lang">
    <span class="lang-link active" onclick="setLang('zh')" id="ln-zh">ZH</span>
    <span class="lang-link" onclick="setLang('en')" id="ln-en">EN</span>
  </div>

  <div class="top-logo">VEX LAB.</div>

  <div class="alchemy-container">
    <aside id="sidebar-nav"></aside>

    <main>
      <div class="desc-card">
        <div style="display:flex; align-items:center; gap:8px; margin-bottom:15px;">
           <div style="width:10px; height:10px; border-radius:50%; background:var(--active-color)"></div>
           <span id="q-diff-text" style="font-size:10px; font-weight:700; color:var(--text-sub)">EASY</span>
        </div>
        <h2 id="q-title">...</h2>
        <p id="q-desc"></p>
      </div>

      <div class="editor-card">
        <textarea id="vex-editor" spellcheck="false" placeholder="// Initializing VEX Kernel..."></textarea>
        <div class="embedded-controls">
          <button class="btn btn-hint" onclick="showHint()" id="btn-hint-txt">HINT</button>
          <button class="btn btn-submit" id="submit-btn" onclick="handleSubmit()">SUBMIT</button>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-overlay" onclick="closeModal()">
    <div class="modal" id="result-modal" onclick="event.stopPropagation()">
      <h3 id="modal-title" style="font-family:'Cormorant Garamond'; font-size:28px; font-style:italic;">Result</h3>
      <div id="modal-body"></div>
      <div id="solution-area" style="display:none">
         <div class="correct-code" id="correct-code-text"></div>
      </div>
      <button class="btn btn-submit" style="width: 100%; margin-top:20px;" onclick="closeModal()" id="btn-modal-close">CONTINUE</button>
    </div>
  </div>

  <script>
    // 第四点：按难度分组的题库，序号独立
    const questions = [
      { category: "BEGINNER", items: [
        { id: "01", difficulty: "easy", color: "var(--easy)", 
          title: { zh: "点染红色", en: "Crimson Hue" },
          desc: { zh: "将几何体中所有点的颜色属性 (@Cd) 设置为纯红色 {1,0,0}。", en: "Set the color attribute (@Cd) of all points to pure red {1,0,0}." },
          hint: { zh: "@Cd = {1,0,0};", en: "@Cd = {1,0,0};" },
          solution: "@Cd = {1,0,0};", attempts: 3 },
        { id: "02", difficulty: "easy", color: "var(--easy)", 
          title: { zh: "属性复制", en: "Attr Copy" },
          desc: { zh: "将点的 X 坐标赋值给红色通道 (@Cd.r)。", en: "Assign X-coordinate to red channel (@Cd.r)." },
          hint: { zh: "@Cd.r = @P.x;", en: "@Cd.r = @P.x;" },
          solution: "@Cd.r = @P.x;", attempts: 3 }
      ]},
      { category: "INTERMEDIATE", items: [
        { id: "01", difficulty: "medium", color: "var(--medium)", 
          title: { zh: "随机缩放", en: "Random Scale" },
          desc: { zh: "基于 @ptnum 生成 0~1 的随机 @pscale。", en: "Generate random @pscale (0-1) based on @ptnum." },
          hint: { zh: "rand()", en: "Use rand()" },
          solution: "@pscale = rand(@ptnum);", attempts: 3 }
      ]}
    ];

    let currentCat = 0, currentIdx = 0, lang = 'zh';

    const uiTexts = {
      zh: { hint: "提示", submit: "提交判断", success: "正确", fail: "分析失败", left: "剩余机会: ", solution: "参考方案:" },
      en: { hint: "HINT", submit: "SUBMIT", success: "PASSED", fail: "FAILURE", left: "Tries left: ", solution: "SOLUTION:" }
    };

    function setLang(l) {
      lang = l;
      document.querySelectorAll('.lang-link').forEach(el => el.classList.remove('active'));
      document.getElementById('ln-' + l).classList.add('active');
      render();
    }

    function render() {
      const nav = document.getElementById('sidebar-nav');
      nav.innerHTML = '';
      questions.forEach((cat, cIdx) => {
        const h = document.createElement('div');
        h.className = 'category-header';
        h.innerText = cat.category;
        nav.appendChild(h);
        
        cat.items.forEach((item, iIdx) => {
          const el = document.createElement('div');
          el.className = `nav-item ${cIdx===currentCat && iIdx===currentIdx ? 'active' : ''}`;
          el.onclick = () => { currentCat=cIdx; currentIdx=iIdx; document.getElementById('vex-editor').value=""; render(); };
          el.innerHTML = `
            <span class="q-num-box">${item.id}</span>
            <div class="q-title-box"><b>${item.title[lang]}</b></div>
            <span class="attempt-tag">${item.attempts}/3</span>
          `;
          nav.appendChild(el);
        });
      });

      const q = questions[currentCat].items[currentIdx];
      document.documentElement.style.setProperty('--active-color', q.color);
      document.getElementById('q-title').innerText = q.title[lang];
      document.getElementById('q-desc').innerText = q.desc[lang];
      document.getElementById('q-diff-text').innerText = q.difficulty.toUpperCase();
      document.getElementById('btn-hint-txt').innerText = uiTexts[lang].hint;
      document.getElementById('submit-btn').innerText = uiTexts[lang].submit;
    }

    async function handleSubmit() {
      const q = questions[currentCat].items[currentIdx];
      const code = document.getElementById('vex-editor').value;
      if (!code.trim() || q.attempts <= 0) return;

      const btn = document.getElementById('submit-btn');
      btn.innerText = "...";

      try {
        const res = await fetch('/api/judge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, questionContext: `Task: ${q.title.en}` })
        });
        const data = await res.json();
        const modal = document.getElementById('result-modal');
        const solArea = document.getElementById('solution-area');

        if (data.result === 'correct') {
          modal.className = "modal success";
          document.getElementById('modal-title').innerText = uiTexts[lang].success;
          document.getElementById('modal-body').innerText = data.explanation;
          solArea.style.display = 'none';
          showModal();
        } else {
          q.attempts--;
          render();
          // 第一点：失败直接弹出淡红色卡片
          modal.className = "modal failure";
          document.getElementById('modal-title').innerText = uiTexts[lang].fail;
          let bodyTxt = data.explanation + "\n\n" + uiTexts[lang].left + q.attempts;
          
          if (q.attempts <= 0) {
            document.getElementById('correct-code-text').innerText = uiTexts[lang].solution + "\n" + q.solution;
            solArea.style.display = 'block';
          } else {
            solArea.style.display = 'none';
          }
          document.getElementById('modal-body').innerText = bodyTxt;
          showModal();
        }
      } catch (e) { alert("Error"); }
      finally { btn.innerText = uiTexts[lang].submit; }
    }

    function showHint() {
      const q = questions[currentCat].items[currentIdx];
      const modal = document.getElementById('result-modal');
      modal.className = "modal";
      document.getElementById('modal-title').innerText = uiTexts[lang].hint;
      document.getElementById('modal-body').innerText = q.hint[lang];
      document.getElementById('solution-area').style.display = 'none';
      showModal();
    }

    function showModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    render();
  </script>
</body>
</html>
