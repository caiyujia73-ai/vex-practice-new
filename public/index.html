<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX Lab Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FDF8F5; --surface: #FFFFFF; --surface2: #FFFBF9;
      --border: #F9A87D; --accent: #F9A87D; --text: #4A4A4A; 
      --muted: #8C8C8C; --diff-easy: #A8E6CF; --diff-medium: #FFD3B6;
      --diff-hard: #FFAAA5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: grid;
      grid-template-columns: 240px 1fr; grid-template-rows: 60px 1fr;
    }

    header {
      grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between;
      padding: 0 25px; background: var(--surface); border-bottom: 2px solid var(--border); z-index: 100;
    }
    .logo { font-weight: 700; font-size: 18px; color: var(--accent); }
    .lang-switch { display: flex; gap: 8px; }
    .lang-btn {
      padding: 4px 10px; border: 1px solid var(--border); background: transparent;
      border-radius: 12px; cursor: pointer; font-family: 'Syne'; font-size: 11px;
    }
    .lang-btn.active { background: var(--accent); color: white; }

    /* Sidebar */
    aside { background: var(--surface); border-right: 1px solid #EEE5E0; padding: 15px; overflow-y: auto; }
    .sidebar-section { 
      font-size: 11px; color: var(--muted); text-transform: uppercase; 
      margin: 20px 0 10px 10px; letter-spacing: 1px; font-weight: 700;
    }
    .q-item {
      padding: 10px 12px; margin-bottom: 4px; border-radius: 8px; cursor: pointer;
      font-size: 13px; transition: 0.2s; border: 1px solid transparent;
      display: flex; align-items: center; justify-content: space-between;
    }
    .q-item:hover { background: var(--surface2); }
    .q-item.active { background: var(--surface2); border-color: var(--border); font-weight: 600; }
    
    .q-num { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--muted); margin-right: 8px; }
    .q-badge { 
      font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: 700;
    }
    .easy { background: var(--diff-easy); color: #1E5631; }
    .medium { background: var(--diff-medium); color: #7A4E2D; }
    .hard { background: var(--diff-hard); color: #7A2D2D; }

    /* Main */
    main { padding: 30px; display: flex; justify-content: center; }
    .answer-card {
      background: var(--surface); border: 2px solid var(--border); border-radius: 12px;
      padding: 30px; width: 100%; max-width: 800px; height: fit-content;
      box-shadow: 0 8px 20px rgba(249, 168, 125, 0.1);
    }
    .q-header h2 { font-size: 24px; margin-bottom: 12px; }
    #q-desc { font-size: 15px; line-height: 1.7; color: #555; margin-bottom: 20px; }

    textarea {
      width: 100%; height: 350px; background: #FBFBFB; border: 1px solid #DDD;
      border-radius: 8px; padding: 18px; font-family: 'JetBrains Mono', monospace;
      font-size: 14px; line-height: 1.5; resize: none; color: #333; margin-bottom: 20px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    .actions { display: flex; justify-content: space-between; }
    .btn {
      padding: 10px 24px; border-radius: 20px; border: 2px solid var(--accent);
      background: transparent; color: var(--accent); font-weight: 700;
      cursor: pointer; font-family: 'Syne'; transition: 0.3s;
    }
    .btn:hover { background: var(--accent); color: white; }
    .btn-primary { background: var(--accent); color: white; }

    /* Modal */
    #modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.3); display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    #modal-overlay.open { display: flex; }
    .modal {
      background: white; padding: 30px; border-radius: 12px; width: 480px; border: 2px solid var(--border);
    }
    #modal-body { background: #F9F9F9; padding: 15px; border-radius: 8px; font-size: 14px; margin: 15px 0; }
  </style>
</head>
<body>

  <header>
    <div class="logo">VEX LAB / HOUDINI</div>
    <div class="lang-switch">
      <button class="lang-btn active" id="btn-zh" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </header>

  <aside>
    <div id="q-list-container"></div>
  </aside>

  <main>
    <div class="answer-card">
      <div class="q-header">
        <h2 id="q-title">Loading...</h2>
        <p id="q-desc"></p>
      </div>
      <textarea id="vex-code" placeholder="Write your VEX code here..."></textarea>
      <div class="actions">
        <button class="btn" onclick="showHint()" id="hint-btn">HINT</button>
        <button class="btn btn-primary" id="submit-btn" onclick="submitCode()">SUBMIT CARD</button>
      </div>
    </div>
  </main>

  <div id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modal-title" style="color: var(--accent)">JUDGE</h3>
      <div id="modal-body"></div>
      <button class="btn" style="width: 100%" onclick="closeModal()" id="close-btn">BACK</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        section: "Beginner",
        id: "001", difficulty: "easy",
        title: { zh: "点染红色", en: "Color Points Red" },
        desc: { zh: "编写 VEX 代码将所有点的颜色属性 (Cd) 设置为纯红色。", en: "Write VEX code to set the color attribute (Cd) of all points to pure red." },
        hint: { zh: "@Cd = {1,0,0};", en: "Use @Cd = {1,0,0};" }
      },
      {
        section: "Beginner",
        id: "002", difficulty: "easy",
        title: { zh: "随机缩放点", en: "Random Scale" },
        desc: { zh: "基于点的编号 (@ptnum) 为每个点创建一个随机的缩放属性 (@pscale)。", en: "Create a random @pscale attribute for each point based on its point number (@ptnum)." },
        hint: { zh: "@pscale = rand(@ptnum);", en: "Try @pscale = rand(@ptnum);" }
      },
      {
        section: "Beginner",
        id: "003", difficulty: "medium",
        title: { zh: "按 Y 轴染色", en: "Color by Y-Axis" },
        desc: { zh: "使点的红色通道 (Cd.r) 根据其在 Y 轴的高度 (@P.y) 进行变化。", en: "Make the red channel of the color (Cd.r) vary according to the Y-axis position (@P.y)." },
        hint: { zh: "@Cd.r = @P.y;", en: "Set @Cd.r = @P.y;" }
      },
      {
        section: "Intermediate",
        id: "004", difficulty: "medium",
        title: { zh: "噪波位移", en: "Noise Displacement" },
        desc: { zh: "使用 Curl Noise 根据点的位置对点的坐标 (@P) 进行偏移。", en: "Offset point positions (@P) using Curl Noise based on current position." },
        hint: { zh: "@P += curlnoise(@P);", en: "Use @P += curlnoise(@P * freq);" }
      },
      {
        section: "Intermediate",
        id: "005", difficulty: "hard",
        title: { zh: "删除偶数点", en: "Remove Even Points" },
        desc: { zh: "编写代码，如果点的编号是偶数，则将其删除。", en: "Write code to remove points if their point number (@ptnum) is an even number." },
        hint: { zh: "if(@ptnum % 2 == 0) removepoint(0, @ptnum);", en: "Use the modulo operator % and removepoint()." }
      }
    ];

    let currentIdx = 0;
    let lang = 'zh';

    const uiText = {
      zh: { hint: "查看提示", submit: "提交答题卡", close: "返回练习", judging: "AI 判题中...", alert: "请输入代码" },
      en: { hint: "HINT", submit: "SUBMIT CARD", close: "CLOSE", judging: "JUDGING...", alert: "Enter code first" }
    };

    function setLang(l) {
      lang = l;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${l}`).classList.add('active');
      render();
    }

    function render() {
      const listContainer = document.getElementById('q-list-container');
      listContainer.innerHTML = '';
      
      let lastSection = "";
      questions.forEach((q, i) => {
        if (q.section !== lastSection) {
          const sectionDiv = document.createElement('div');
          sectionDiv.className = 'sidebar-section';
          sectionDiv.innerText = q.section;
          listContainer.appendChild(sectionDiv);
          lastSection = q.section;
        }

        const div = document.createElement('div');
        div.className = `q-item ${i === currentIdx ? 'active' : ''}`;
        div.onclick = () => { currentIdx = i; render(); };
        div.innerHTML = `
          <div><span class="q-num">#${q.id}</span>${q.title[lang]}</div>
          <span class="q-badge ${q.difficulty}">${q.difficulty}</span>
        `;
        listContainer.appendChild(div);
      });

      const q = questions[currentIdx];
      document.getElementById('q-title').innerText = q.title[lang];
      document.getElementById('q-desc').innerText = q.desc[lang];
      document.getElementById('hint-btn').innerText = uiText[lang].hint;
      document.getElementById('submit-btn').innerText = uiText[lang].submit;
      document.getElementById('close-btn').innerText = uiText[lang].close;
    }

    async function submitCode() {
      const code = document.getElementById('vex-code').value;
      if (!code.trim()) return alert(uiText[lang].alert);

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.innerText = uiText[lang].judging;

      try {
        const res = await fetch('/api/judge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            code: code,
            system: `你是一个 Houdini VEX 专家。题目：${questions[currentIdx].title.zh}。请判断代码。返回JSON：{"result":"correct/wrong","short":"总结","explanation":"分析"}`
          })
        });
        const data = await res.json();
        document.getElementById('modal-title').innerText = (data.result === 'correct' ? '✅ ' : '❌ ') + data.short;
        document.getElementById('modal-body').innerText = data.explanation;
        document.getElementById('modal-overlay').classList.add('open');
      } catch (e) { alert("Error"); }
      finally { btn.disabled = false; btn.innerText = uiText[lang].submit; }
    }

    function showHint() {
      document.getElementById('modal-title').innerText = "💡 HINT";
      document.getElementById('modal-body').innerText = questions[currentIdx].hint[lang];
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

    setLang('zh');
  </script>
</body>
</html>
