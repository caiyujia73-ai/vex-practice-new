<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX LAB | Premium Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Cormorant+Garamond:ital,wght@1,600;1,700&family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #FFF5EE; /* 第三点：最底层淡淡的橙色 */
      --glass: rgba(255, 255, 255, 0.5);
      --card-white: #FFFFFF;
      --text-main: #2D2D2D;
      --text-sub: #888888;
      
      /* 莫兰迪难度色 */
      --easy: #A3B18A;
      --medium: #E9C46A;
      --hard: #E07A5F;
      
      --active-color: var(--easy);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg-base); /* 网页底色 */
      height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      overflow: hidden;
    }

    /* 第二点：复古打字机字体 Title，放到最顶上 */
    .top-logo {
      font-family: 'Special Elite', cursive;
      font-size: 32px;
      color: var(--text-main);
      padding: 25px 0 10px 0;
      letter-spacing: 2px;
    }

    /* 主容器 */
    .alchemy-container {
      width: 95vw; height: 82vh; max-width: 1200px;
      background: var(--glass);
      backdrop-filter: blur(25px);
      border-radius: 40px;
      display: flex;
      box-shadow: 0 40px 100px rgba(0,0,0,0.03);
      border: 1px solid rgba(255,255,255,0.7);
      position: relative;
    }

    /* 侧边栏 */
    aside {
      width: 80px; height: 100%;
      background: rgba(255, 255, 255, 0.2);
      border-right: 1px solid rgba(0,0,0,0.05);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden; display: flex; flex-direction: column;
    }
    aside:hover { width: 300px; }

    .nav-item {
      display: flex; align-items: center;
      padding: 12px 20px; margin: 5px 10px;
      border-radius: 15px; cursor: pointer; transition: 0.3s;
    }
    .nav-icon-circle {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--card-white); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 12px; color: var(--text-sub);
    }
    .nav-text-box { margin-left: 15px; opacity: 0; transition: 0.2s; white-space: nowrap; flex: 1; }
    aside:hover .nav-text-box { opacity: 1; }

    /* 第四点：次数显示 3/3 */
    .attempt-counter {
      font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-sub);
      margin-left: 10px; background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px;
    }

    .nav-item.active .nav-icon-circle { background: var(--active-color); color: white; }

    /* 主内容 */
    main { flex: 1; display: flex; flex-direction: column; padding: 0 40px; }

    header {
      height: 60px; display: flex; align-items: center; justify-content: flex-end;
    }
    .lang-switcher { display: flex; gap: 15px; }
    .lang-link { cursor: pointer; font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; }
    .lang-link.active { color: var(--active-color); }

    .content-grid {
      flex: 1; display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: center; padding-bottom: 40px;
    }

    .desc-card {
      background: var(--card-white); padding: 40px; border-radius: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.04); height: 500px;
      display: flex; flex-direction: column; justify-content: center;
    }
    .desc-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 38px; color: var(--active-color); margin-bottom: 20px; font-style: italic; }
    .desc-card p { font-size: 14px; color: var(--text-sub); line-height: 1.8; }

    /* 第一点：输入框嵌入按钮设计 */
    .editor-card {
      background: var(--card-white); border-radius: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.04); height: 540px;
      position: relative; display: flex; flex-direction: column; overflow: hidden;
    }
    #vex-editor {
      flex: 1; border: none; outline: none; padding: 30px;
      font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1.8; resize: none;
    }

    .embedded-controls {
      position: absolute; bottom: 20px; right: 20px;
      display: flex; gap: 10px; background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(5px); padding: 6px; border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .btn { padding: 8px 20px; border-radius: 15px; cursor: pointer; font-family: 'Syne'; font-weight: 700; font-size: 11px; transition: 0.3s; }
    .btn-hint { background: transparent; border: 1px solid #EEE; color: var(--text-sub); }
    .btn-submit { background: var(--text-main); color: white; border: none; }
    .btn-submit:hover { background: var(--active-color); transform: translateY(-2px); }

    /* 弹窗样式 */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.2);
      backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal { width: 500px; padding: 45px; border-radius: 35px; text-align: center; box-shadow: 0 40px 80px rgba(0,0,0,0.1); }
    .modal.success { background: #F2F9F5; border: 1px solid #D4EDDA; }
    .modal.failure { background: #FFF5F5; border: 1px solid #FEB2B2; }
    #modal-body { font-size: 14px; line-height: 1.8; color: #666; margin: 25px 0; }
    .correct-code { background: #FFFFFF; padding: 15px; border-radius: 12px; font-family: 'JetBrains Mono'; font-size: 12px; color: #C53030; text-align: left; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="top-logo">VEX LAB.</div>

  <div class="alchemy-container">
    <aside id="sidebar">
      <div id="q-list-container"></div>
    </aside>

    <main>
      <header>
        <div class="lang-switcher">
          <span class="lang-link active" onclick="setLang('zh')" id="ln-zh">ZH</span>
          <span class="lang-link" onclick="setLang('en')" id="ln-en">EN</span>
        </div>
      </header>

      <div class="content-grid">
        <div class="desc-card">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:15px;">
             <div style="width:10px; height:10px; border-radius:50%; background:var(--active-color)"></div>
             <span id="q-diff-text" style="font-size:10px; font-weight:700; color:var(--text-sub)">EASY</span>
          </div>
          <h2 id="q-title">...</h2>
          <p id="q-desc"></p>
        </div>

        <div class="editor-card">
          <textarea id="vex-editor" spellcheck="false" placeholder="// Initializing VEX Kernel..."></textarea>
          
          <div class="embedded-controls">
            <button class="btn btn-hint" onclick="showHint()" id="btn-hint-txt">HINT</button>
            <button class="btn btn-submit" id="submit-btn" onclick="handleSubmit()">SUBMIT</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="modal-overlay" onclick="closeModal()">
    <div class="modal" id="result-modal" onclick="event.stopPropagation()">
      <h3 id="modal-title" style="font-family:'Cormorant Garamond'; font-size:28px; font-style:italic;">Result</h3>
      <div id="modal-body"></div>
      <div id="solution-area" style="display:none">
         <div class="correct-code" id="correct-code-text"></div>
      </div>
      <button class="btn btn-submit" style="width: 100%; margin-top:20px;" onclick="closeModal()" id="btn-modal-close">CONTINUE</button>
    </div>
  </div>

  <script>
    const questions = [
      { id: "01", difficulty: "easy", color: "var(--easy)", 
        title: { zh: "点染红色", en: "Crimson Hue" },
        desc: { zh: "将几何体中所有点的颜色属性 (@Cd) 设置为纯红色 {1,0,0}。", en: "Set the color attribute (@Cd) of all points to pure red {1,0,0}." },
        hint: { zh: "@Cd = {1,0,0};", en: "@Cd = {1,0,0};" },
        solution: "@Cd = {1,0,0};",
        attemptsLeft: 3 // 第四点：每个题目独立的尝试次数
      },
      { id: "02", difficulty: "medium", color: "var(--medium)", 
        title: { zh: "随机缩放", en: "Random Scale" },
        desc: { zh: "基于 @ptnum 为每个点生成随机的 @pscale。", en: "Generate a random @pscale for each point based on @ptnum." },
        hint: { zh: "使用 rand() 函数。", en: "Use rand() function." },
        solution: "@pscale = rand(@ptnum);",
        attemptsLeft: 3
      },
      { id: "03", difficulty: "hard", color: "var(--hard)", 
        title: { zh: "噪波位移", en: "Flowing Noise" },
        desc: { zh: "使用 curlnoise 偏移位置 @P。", en: "Offset position @P using curlnoise." },
        hint: { zh: "@P += curlnoise(@P);", en: "@P += curlnoise(@P);" },
        solution: "@P += curlnoise(@P);",
        attemptsLeft: 3
      }
    ];

    let currentIdx = 0;
    let lang = 'zh';

    const uiTexts = {
      zh: { hint: "线索", submit: "执行分析", success: "逻辑正确", fail: "分析失败", retry: "逻辑有误, 尚存机会: ", solution: "官方方案:" },
      en: { hint: "HINT", submit: "SUBMIT", success: "LOGIC PASSED", fail: "FAILED", retry: "Logic Error, Tries left: ", solution: "SOLUTION:" }
    };

    function setLang(l) {
      lang = l;
      document.querySelectorAll('.lang-link').forEach(el => el.classList.remove('active'));
      document.getElementById('ln-' + l).classList.add('active');
      render();
    }

    function render() {
      const qContainer = document.getElementById('q-list-container');
      qContainer.innerHTML = '';
      questions.forEach((q, i) => {
        const item = document.createElement('div');
        item.className = `nav-item ${i === currentIdx ? 'active' : ''}`;
        item.onclick = () => { if(currentIdx!==i) { currentIdx=i; document.getElementById('vex-editor').value=""; render(); } };
        item.innerHTML = `
          <div class="nav-icon-circle">${q.id}</div>
          <div class="nav-text-box">
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <b style="font-size:13px">${q.title[lang]}</b>
              <span class="attempt-counter">${q.attemptsLeft}/3</span>
            </div>
            <span style="font-size:9px; color:#AAA;">${q.difficulty.toUpperCase()}</span>
          </div>
        `;
        qContainer.appendChild(item);
      });

      const q = questions[currentIdx];
      document.documentElement.style.setProperty('--active-color', q.color);
      document.getElementById('q-title').innerText = q.title[lang];
      document.getElementById('q-desc').innerText = q.desc[lang];
      document.getElementById('q-diff-text').innerText = q.difficulty.toUpperCase();
      document.getElementById('btn-hint-txt').innerText = uiTexts[lang].hint;
      document.getElementById('submit-btn').innerText = uiTexts[lang].submit;
    }

    async function handleSubmit() {
      const code = document.getElementById('vex-editor').value;
      if (!code.trim()) return;

      const q = questions[currentIdx];
      if (q.attemptsLeft <= 0) return alert("No more tries left for this question.");

      const btn = document.getElementById('submit-btn');
      btn.innerText = "...";

      try {
        const res = await fetch('/api/judge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, questionContext: `Task: ${q.title.en}` })
        });
        const data = await res.json();
        
        const modal = document.getElementById('result-modal');
        const solArea = document.getElementById('solution-area');
        
        if (data.result === 'correct') {
          modal.className = "modal success";
          document.getElementById('modal-title').innerText = uiTexts[lang].success;
          document.getElementById('modal-body').innerText = data.explanation;
          solArea.style.display = 'none';
          showModal();
        } else {
          q.attemptsLeft--; // 减少机会
          render(); // 实时更新侧边栏 3/3 状态

          if (q.attemptsLeft > 0) {
            alert(uiTexts[lang].retry + q.attemptsLeft);
          } else {
            modal.className = "modal failure";
            document.getElementById('modal-title').innerText = uiTexts[lang].fail;
            document.getElementById('modal-body').innerText = data.explanation;
            document.getElementById('correct-code-text').innerText = uiTexts[lang].solution + "\n" + q.solution;
            solArea.style.display = 'block';
            showModal();
          }
        }
      } catch (e) { alert("Error connecting to server"); }
      finally { btn.innerText = uiTexts[lang].submit; }
    }

    function showHint() {
      const modal = document.getElementById('result-modal');
      modal.className = "modal";
      document.getElementById('modal-title').innerText = uiTexts[lang].hint;
      document.getElementById('modal-body').innerText = questions[currentIdx].hint[lang];
      document.getElementById('solution-area').style.display = 'none';
      showModal();
    }

    function showModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    render();
  </script>
</body>
</html>
