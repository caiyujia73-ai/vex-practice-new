<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX Orange Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F2EDE4; /* 复古纸张色 */
      --sidebar-bg: #2D433D; /* 墨绿色 */
      --orange: #FF8C42; /* 饱和度稍高的橘子色 */
      --text: #3D3D3D;
      --border: #2D2D2D;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Special Elite', system-ui; /* 全局切换为打字机字体 */
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* --- 侧边栏 --- */
    aside {
      background: var(--sidebar-bg);
      color: #E2DDD3;
      padding: 30px 20px;
      border-right: 4px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-size: 24px;
      color: var(--orange);
      margin-bottom: 40px;
      text-decoration: underline;
    }

    .q-item {
      padding: 12px;
      margin-bottom: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    .q-item:hover { background: rgba(255,255,255,0.05); }
    .q-item.active {
      background: var(--bg);
      color: var(--text);
      border: 2px solid var(--border);
      box-shadow: 4px 4px 0px var(--border); /* 复古硬阴影 */
    }

    /* --- 主区域 --- */
    main {
      padding: 40px;
      overflow-y: auto;
      background-image: radial-gradient(#d1ccc0 1px, transparent 1px); /* 微弱的纸张底噪 */
      background-size: 20px 20px;
    }

    /* 积分栏 */
    .status-section {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
      padding-bottom: 10px;
      border-bottom: 2px dashed var(--border);
    }

    .vc-badge {
      background: var(--orange);
      color: white;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 14px;
      box-shadow: 2px 2px 0 var(--border);
    }

    /* 答题卡 */
    .report-card {
      background: white;
      border: 3px solid var(--border);
      padding: 40px;
      box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
      position: relative;
    }

    .report-card::before { /* 模拟回形针 */
      content: "";
      position: absolute;
      top: -15px; right: 40px;
      width: 20px; height: 50px;
      border: 3px solid #999;
      border-radius: 10px;
    }

    h2 { font-size: 32px; margin-bottom: 15px; }
    p { line-height: 1.6; margin-bottom: 25px; }

    /* 代码编辑器 */
    .editor-container {
      background: #f9f9f9;
      border: 2px solid var(--border);
      padding: 20px;
      margin-bottom: 25px;
    }

    textarea {
      width: 100%;
      height: 300px;
      background: transparent;
      border: none;
      font-family: 'JetBrains Mono', monospace; /* 代码保留等宽字体 */
      font-size: 15px;
      outline: none;
      resize: none;
      color: #333;
    }

    /* 按钮 */
    .actions { display: flex; gap: 20px; }
    .btn {
      font-family: 'Special Elite', cursive;
      padding: 12px 25px;
      border: 2px solid var(--border);
      cursor: pointer;
      font-weight: bold;
      transition: 0.1s;
    }
    .btn-hint { background: white; color: #666; }
    .btn-submit { background: var(--orange); color: white; box-shadow: 4px 4px 0 var(--border); }
    .btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0; }

    /* 印章效果 */
    #stamp {
      position: absolute;
      top: 50px;
      right: 100px;
      border: 4px solid #d9534f;
      color: #d9534f;
      padding: 10px 20px;
      font-size: 30px;
      font-weight: bold;
      text-transform: uppercase;
      transform: rotate(-15deg);
      opacity: 0.8;
      display: none;
      border-radius: 10px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <aside>
    <div class="logo">ORANGE ARCHIVE</div>
    <div style="font-size: 12px; margin-bottom: 20px; color: var(--orange)">CLASSIFIED: TOP SECRET</div>
    
    <div class="q-item active">FILE #001: RED_DOT</div>
    <div class="q-item">FILE #002: RAND_SCALE</div>
    <div class="q-item">FILE #003: Y_GRADIENT</div>
  </aside>

  <main>
    <div class="status-section">
      <div>RANK: <span id="rank-name">NOVICE JUICER</span></div>
      <div class="vc-badge">VITAMIN C: <span id="vc-val">0</span> mg</div>
    </div>

    <div class="report-card">
      <div id="stamp">PASSED</div>
      <h2>Subject: 点染红色</h2>
      <p>指令详情：利用 VEX 语言将几何体所有点的属性 @Cd 覆盖为红色 {1,0,0}。这是榨取第一杯橘汁的基础。</p>
      
      <div class="editor-container">
        <textarea id="vex-input" placeholder="// 在此处键入您的 VEX 逻辑..."></textarea>
      </div>

      <div class="actions">
        <button class="btn btn-hint" onclick="getHint()">获取线索 (-2mg)</button>
        <button class="btn btn-submit" onclick="submitCode()">提交归档 (+10mg)</button>
      </div>
    </div>
  </main>

  <script>
    let vc = 0;

    function submitCode() {
      const btn = document.querySelector('.btn-submit');
      btn.innerText = "JUDGING...";
      
      // 模拟成功逻辑
      setTimeout(() => {
        const stamp = document.getElementById('stamp');
        stamp.style.display = 'block';
        vc += 10;
        document.getElementById('vc-val').innerText = vc;
        btn.innerText = "SUBMITTED";
        
        // 升级逻辑
        if(vc >= 20) document.getElementById('rank-name').innerText = "CITRUS MASTER";
      }, 1500);
    }

    function getHint() {
      if(vc < 2) return alert("VC 不足！");
      vc -= 2;
      document.getElementById('vc-val').innerText = vc;
      alert("参考逻辑：@Cd = {1,0,0};");
    }
  </script>
</body>
</html>
