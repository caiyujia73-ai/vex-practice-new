<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX Alchemy Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,600;1,700&family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F0F2F5; /* 极淡的灰米色，模拟参考图底色 */
      --glass: rgba(255, 255, 255, 0.7);
      --card-white: #FFFFFF;
      --accent-orange: #F9A87D;
      --text-main: #2D2D2D;
      --text-sub: #888888;
      
      /* 难度颜色，参考图中的配色风格 */
      --easy-blue: #7395AE;
      --mid-orange: #F9A87D;
      --hard-beige: #E1D8C1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* --- 全局背景装饰 (参考图中的光影感) --- */
    body::before {
      content: ""; position: absolute; top: -10%; right: -10%; width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(249, 168, 125, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* --- 主容器 (那层大的圆角浅色背景) --- */
    .alchemy-container {
      width: 95vw;
      height: 90vh;
      max-width: 1200px;
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      display: grid;
      grid-template-columns: 80px 1fr;
      box-shadow: 0 40px 100px rgba(0,0,0,0.03);
      border: 1px solid rgba(255,255,255,0.6);
      position: relative;
    }

    /* --- 极简左侧栏 --- */
    aside {
      border-right: 1px solid rgba(0,0,0,0.05);
      padding: 30px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    
    .nav-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--card-white);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      font-size: 12px; color: var(--text-sub);
    }
    .nav-icon.active { background: var(--accent-orange); color: white; transform: scale(1.1); }

    /* --- 内容主区域 --- */
    main {
      display: grid;
      grid-template-rows: 80px 1fr 80px;
      padding: 0 40px;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 24px; }
    
    .lang-switcher {
      display: flex; gap: 15px;
    }
    .lang-link { cursor: pointer; font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
    .lang-link.active { color: var(--accent-orange); }

    /* --- 卡片展示区 --- */
    .content-grid {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 30px;
      align-items: center;
    }

    /* 左侧描述卡片 */
    .desc-card {
      background: var(--card-white);
      padding: 40px;
      border-radius: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.04);
      height: 480px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .desc-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-bottom: 20px; line-height: 1.2; }
    .desc-card p { font-size: 14px; color: var(--text-sub); line-height: 1.8; margin-bottom: 30px; }
    
    .diff-dots { display: flex; gap: 10px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }

    /* 右侧编辑器卡片 */
    .editor-card {
      background: var(--card-white);
      padding: 20px;
      border-radius: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.04);
      height: 520px;
      display: flex;
      flex-direction: column;
    }
    #vex-editor {
      flex: 1; border: none; outline: none;
      font-family: 'JetBrains Mono', monospace; font-size: 14px;
      line-height: 1.8; padding: 20px; color: #444; resize: none;
    }

    /* --- 底部操作栏 --- */
    footer {
      display: flex; align-items: center; justify-content: flex-end; gap: 20px;
    }
    .btn {
      padding: 12px 35px; border-radius: 25px; cursor: pointer;
      font-family: 'Syne'; font-weight: 700; font-size: 12px; transition: 0.3s;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .btn-hint { background: transparent; border: 1px solid #EEE; color: var(--text-sub); }
    .btn-submit { background: #2D2D2D; color: white; border: none; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

    /* Modal (反馈窗也要美) */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(255,255,255,0.4);
      backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: white; width: 450px; padding: 40px; border-radius: 32px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.1); text-align: center;
    }
  </style>
</head>
<body>

  <div class="alchemy-container">
    <aside id="nav-list">
      </aside>

    <main>
      <header>
        <div class="brand">VEX Alchemy.</div>
        <div class="lang-switcher">
          <span class="lang-link active" onclick="setLang('zh')">ZH</span>
          <span class="lang-link" onclick="setLang('en')">EN</span>
        </div>
      </header>

      <div class="content-grid">
        <div class="desc-card">
          <div class="diff-dots" id="diff-dots"></div>
          <h2 id="q-title">...</h2>
          <p id="q-desc"></p>
        </div>

        <div class="editor-card">
          <textarea id="vex-editor" spellcheck="false" placeholder="// 开始你的逻辑调制..."></textarea>
        </div>
      </div>

      <footer>
        <button class="btn btn-hint" onclick="showHint()">Hint</button>
        <button class="btn btn-submit" id="submit-btn" onclick="submit()">提交分析</button>
      </footer>
    </main>
  </div>

  <div id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modal-title" style="font-family:'Cormorant Garamond'; font-size:28px; font-style:italic; margin-bottom:20px;">Result</h3>
      <div id="modal-body" style="font-size:14px; line-height:1.7; color:#666; margin-bottom:30px;"></div>
      <button class="btn btn-submit" style="width: 100%" onclick="closeModal()">返回</button>
    </div>
  </div>

  <script>
    const questions = [
      { id: "01", difficulty: "easy", color: "var(--easy-blue)", title: { zh: "点染红色", en: "Crimson Hue" }, desc: { zh: "在这杯逻辑中加入红色。将所有点的 @Cd 设为 {1,0,0}。", en: "Add a touch of red to this logic. Set @Cd to {1,0,0} for all points." }, hint: "@Cd = {1,0,0};" },
      { id: "02", difficulty: "medium", color: "var(--mid-orange)", title: { zh: "随机缩放", en: "Random Growth" }, desc: { zh: "为每个点注入随机的生命力。基于 @ptnum 生成随机 @pscale。", en: "Inject random vitality into each point. Generate @pscale based on @ptnum." }, hint: "@pscale = rand(@ptnum);" },
      { id: "03", difficulty: "hard", color: "var(--hard-beige)", title: { zh: "噪波位移", en: "Flowing Noise" }, desc: { zh: "让形态如液体般流动。使用 curlnoise 偏移位置 @P。", en: "Let the form flow like liquid. Offset position @P using curlnoise." }, hint: "@P += curlnoise(@P);" }
    ];

    let currentIdx = 0;
    let lang = 'zh';

    function setLang(l) {
      lang = l;
      render();
    }

    function render() {
      // 侧边栏图标
      const nav = document.getElementById('nav-list');
      nav.innerHTML = '';
      questions.forEach((q, i) => {
        const icon = document.createElement('div');
        icon.className = `nav-icon ${i === currentIdx ? 'active' : ''}`;
        icon.innerText = q.id;
        icon.onclick = () => { if(currentIdx !== i) { currentIdx = i; document.getElementById('vex-editor').value = ""; render(); } };
        nav.appendChild(icon);
      });

      const q = questions[currentIdx];
      document.getElementById('q-title').innerText = q.title[lang];
      document.getElementById('q-desc').innerText = q.desc[lang];
      
      const dots = document.getElementById('diff-dots');
      dots.innerHTML = `<div class="dot" style="background:${q.color}"></div><span style="font-size:10px; color:#888; text-transform:uppercase">${q.difficulty}</span>`;
    }

    async function submit() {
      const code = document.getElementById('vex-editor').value;
      if(!code.trim()) return;
      const btn = document.getElementById('submit-btn');
      btn.innerText = "...";
      try {
        const res = await fetch('/api/judge', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code, questionContext: `Task: ${questions[currentIdx].title.en}.` })
        });
        const data = await res.json();
        showModal(data.result === 'correct' ? 'Success' : 'Revision', data.explanation);
      } catch (e) { alert("Error"); }
      finally { btn.innerText = "提交分析"; }
    }

    function showModal(title, content) {
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-body').innerText = content;
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    function showHint() { showModal("Hint", questions[currentIdx].hint); }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    render();
  </script>
</body>
</html>
